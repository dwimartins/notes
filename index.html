
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Private Thoughts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep Slate */
            color: #f1f5f9;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .note-input {
            background: #1e293b;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .note-input:focus {
            border-color: #94a3b8;
            outline: none;
            box-shadow: 0 0 15px rgba(148, 163, 184, 0.1);
        }
        .btn-gold {
            background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%);
            color: #0f172a;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <header class="mb-12 text-center">
            <h1 class="text-3xl font-light tracking-widest uppercase text-slate-300">Inner <span class="font-semibold text-white">Space</span></h1>
            <p class="text-slate-500 mt-2 italic">Tuangkan ide, rencana, dan unek-unekmu di sini.</p>
        </header>

        <div class="glass-card p-6 rounded-2xl mb-12">
            <input type="text" id="noteTitle" placeholder="Judul ide..." class="note-input w-full p-4 rounded-xl mb-4 text-white">
            <textarea id="noteContent" rows="4" placeholder="Apa yang sedang kamu pikirkan?" class="note-input w-full p-4 rounded-xl mb-4 text-white"></textarea>
            
            <div class="flex flex-col md:flex-row gap-4 items-center justify-between">
                <input type="file" id="imageInput" accept="image/*" class="text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-700 file:text-slate-200 hover:file:bg-slate-600 cursor-pointer">
                <button onclick="saveNote()" class="btn-gold px-8 py-3 rounded-xl font-semibold w-full md:w-auto hover:opacity-90 transition">Simpan Catatan</button>
            </div>
            <div id="previewContainer" class="mt-4 hidden text-center">
                <p class="text-xs text-slate-500 mb-2">Preview Gambar:</p>
                <img id="imagePreview" src="" class="max-h-40 mx-auto rounded-lg border border-slate-700">
            </div>
        </div>

        <div id="notesContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // GANTI DENGAN CONFIG KAMU SENDIRI
        const firebaseConfig = {
          apiKey: "AIzaSyA8lQ2xYxho8ZELwUl1FK4Xn9-OWqf26Qw",
          authDomain: "notes-18536.firebaseapp.com",
          projectId: "notes-18536",
          storageBucket: "notes-18536.firebasestorage.app",
          messagingSenderId: "357079507581",
          appId: "1:357079507581:web:4a4ccedcafc7fbc2eec714"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const notesCol = collection(db, "myNotes");

        // Logic Preview Gambar & Convert ke Base64
        let base64Image = "";
        document.getElementById('imageInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onloadend = () => {
                base64Image = reader.result;
                document.getElementById('imagePreview').src = base64Image;
                document.getElementById('previewContainer').classList.remove('hidden');
            };
            if (file) reader.readAsDataURL(file);
        });

        // Simpan ke Firestore
        window.saveNote = async () => {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;

            if (!title || !content) return alert("Isi judul dan kontennya dulu ya!");

            try {
                await addDoc(notesCol, {
                    title,
                    content,
                    image: base64Image,
                    createdAt: new Date()
                });
                // Reset form
                document.getElementById('noteTitle').value = "";
                document.getElementById('noteContent').value = "";
                document.getElementById('imageInput').value = "";
                document.getElementById('previewContainer').classList.add('hidden');
                base64Image = "";
            } catch (e) {
                console.error("Error adding document: ", e);
            }
        };

        // Ambil Data Real-time & Tampilkan
        const q = query(notesCol, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById('notesContainer');
            container.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const id = docSnap.id;
                
                const card = `
                    <div class="glass-card p-5 rounded-2xl flex flex-col justify-between">
                        <div>
                            ${data.image ? `<img src="${data.image}" class="w-full h-40 object-cover rounded-xl mb-4">` : ''}
                            <h3 class="text-xl font-semibold mb-2">${data.title}</h3>
                            <p class="text-slate-400 text-sm whitespace-pre-line">${data.content}</p>
                        </div>
                        <div class="mt-6 flex justify-between items-center">
                            <span class="text-[10px] text-slate-600 uppercase tracking-widest">${new Date(data.createdAt.toDate()).toLocaleDateString()}</span>
                            <button onclick="deleteNote('${id}')" class="text-red-400 hover:text-red-300 text-sm font-medium">Hapus</button>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        });

        // Hapus Catatan
        window.deleteNote = async (id) => {
            if(confirm("Yakin ingin menghapus ide ini?")) {
                await deleteDoc(doc(db, "myNotes", id));
            }
        };
    </script>
</body>
</html>
